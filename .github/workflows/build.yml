name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout
  id-token: write # OIDC token for Sigstore signing
  attestations: write # persist build-provenance attestations

jobs:
  linux_nix:
    # Skip when dispatched from release.yml's publish phase: the smoke
    # `build` job already validated nix against this commit minutes earlier,
    # and the nix output isn't attached to the GitHub release.
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@8cd236d2625eddac0a5ce3520e49be7be3631079 # main

  windows:
    name: Build Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: x86_64,
              target: x86_64-pc-windows-msvc,
              url_target: windows64,
            }
          - { arch: i686, target: i686-pc-windows-msvc, url_target: windows32 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cef-binary
        with:
          path: cef_interface/cef_binary
          key: cef-binary-${{ hashFiles('cef_binary_version') }}-${{ matrix.config.url_target }}

      - name: Fetch cef_binary
        if: ${{ steps.cache-cef-binary.outputs.cache-hit != 'true' }}
        run: |
          $version = (Get-Content -Path cef_binary_version).Trim()
          $dirname = "cef_binary_${version}_${{ matrix.config.url_target }}"
          $url = "https://cef-builds.spotifycdn.com/$dirname.tar.bz2"
          echo "$url"
          aria2c "$url" -o cef_binary.tar.bz2 --max-connection-per-server=4
          7z x -y 'cef_binary.tar.bz2'
          Remove-Item 'cef_binary.tar.bz2'
          7z x -y 'cef_binary.tar'
          Remove-Item 'cef_binary.tar'
          if (Test-Path 'cef_interface/cef_binary') { Remove-Item -Recurse 'cef_interface/cef_binary' }
          Move-Item -Path "$dirname" -Destination 'cef_interface/cef_binary'

      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@8cd236d2625eddac0a5ce3520e49be7be3631079 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  linux:
    name: Build Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: x86_64,
              target: x86_64-unknown-linux-gnu,
              url_target: linux64,
            }
          - {
              arch: aarch64,
              target: aarch64-unknown-linux-gnu,
              url_target: linuxarm64,
            }
          - { arch: i686, target: i686-unknown-linux-gnu, url_target: linux32 }
          - {
              arch: armhf,
              target: armv7-unknown-linux-gnueabihf,
              url_target: linuxarm,
            }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # x86_64: all build tools (gcc/g++/cmake/clang/rustup/aria2/pkg-config/
      # libssl-dev) and chromium runtime libs (transitive deps of the
      # preinstalled Chromium) ship with the ubuntu-24.04 runner image.
      # aarch64/armhf: cross handles deps inside its Docker image; the host
      # only needs aria2 (preinstalled) for the Fetch step. No setup needed.

      - name: Install i686 cross deps
        if: ${{ matrix.config.arch == 'i686' }}
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get -y update
          sudo apt-get -y install pkg-config:i386 \
            gcc-multilib g++-multilib \
            libssl-dev:i386 \
            libssl3t64:i386 libglib2.0-0t64:i386 libnss3:i386 libnspr4:i386 libdbus-1-3:i386 libatk1.0-0t64:i386 libatk-bridge2.0-0t64:i386 libcups2t64:i386 libdrm2:i386 libxcomposite1:i386 libxdamage1:i386 libxfixes3:i386 libxrandr2:i386 libgbm1:i386 libxkbcommon0:i386 libpango-1.0-0:i386 libcairo2:i386 libasound2t64:i386 libatspi2.0-0t64:i386
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: ${{ matrix.config.arch != 'i686' }}
        id: cache-cef-binary
        with:
          path: cef_interface/cef_binary
          key: cef-binary-${{ hashFiles('cef_binary_version') }}-${{ matrix.config.url_target }}

      - name: Fetch cef_binary
        if: ${{ matrix.config.arch != 'i686' && steps.cache-cef-binary.outputs.cache-hit != 'true' }}
        run: |
          version="$(cat cef_binary_version)"
          dirname="cef_binary_${version}_${{ matrix.config.url_target }}"
          url="https://cef-builds.spotifycdn.com/$dirname.tar.bz2"
          echo "$url"
          aria2c "$url" -o cef_binary.tar.bz2 --max-connection-per-server=4
          tar -xjf cef_binary.tar.bz2
          rm cef_binary.tar.bz2
          rm -rf cef_interface/cef_binary
          mv -vT "$dirname" cef_interface/cef_binary

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: ${{ matrix.config.arch == 'i686' }}
        id: cache-cef-binary-i686
        with:
          path: cef_interface/cef_binary
          key: cef-binary-${{ matrix.config.url_target }}

      - name: Fetch cef_binary (i686 pinned)
        if: ${{ matrix.config.arch == 'i686' && steps.cache-cef-binary-i686.outputs.cache-hit != 'true' }}
        # Linux x86 32-bit builds are discontinued after version 101
        # https://cef-builds.spotifycdn.com/index.html#linux32
        run: |
          version='101.0.18+g367b4a0+chromium-101.0.4951.67'
          dirname="cef_binary_${version}_${{ matrix.config.url_target }}"
          url="https://cef-builds.spotifycdn.com/$dirname.tar.bz2"
          echo "$url"
          aria2c "$url" -o cef_binary.tar.bz2 --max-connection-per-server=4
          tar -xjf cef_binary.tar.bz2
          rm cef_binary.tar.bz2
          rm -rf cef_interface/cef_binary
          mv -vT "$dirname" cef_interface/cef_binary

      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@8cd236d2625eddac0a5ce3520e49be7be3631079 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}
          use-cross: ${{ matrix.config.arch == 'aarch64' || matrix.config.arch == 'armhf' }}

  mac:
    name: Build MacOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: aarch64,
              target: aarch64-apple-darwin,
              url_target: macosarm64,
            }
          - { arch: x86_64, target: x86_64-apple-darwin, url_target: macosx64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cef-binary
        with:
          path: cef_interface/cef_binary
          key: cef-binary-${{ hashFiles('cef_binary_version') }}-${{ matrix.config.url_target }}

      - name: Fetch cef_binary
        if: ${{ steps.cache-cef-binary.outputs.cache-hit != 'true' }}
        run: |
          version="$(cat cef_binary_version)"
          dirname="cef_binary_${version}_${{ matrix.config.url_target }}"
          url="https://cef-builds.spotifycdn.com/$dirname.tar.bz2"
          echo "$url"
          aria2c "$url" -o cef_binary.tar.bz2 --max-connection-per-server=4
          tar -xjf cef_binary.tar.bz2
          rm cef_binary.tar.bz2
          rm -rf cef_interface/cef_binary
          mv -v "$dirname" cef_interface/cef_binary

      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@8cd236d2625eddac0a5ce3520e49be7be3631079 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}
